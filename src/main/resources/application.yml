spring:
  application:
    name: automatic-train-assignment
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/interlocking}
    username: ${DATABASE_USER:interlocking}
    password: ${DATABASE_PASSWORD:interlocking}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful

