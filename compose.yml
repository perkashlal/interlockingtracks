services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: interlocking
      POSTGRES_USER: interlocking
      POSTGRES_PASSWORD: interlocking
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interlocking -d interlocking"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - interlocking-postgres:/var/lib/postgresql/data

volumes:
  interlocking-postgres:

