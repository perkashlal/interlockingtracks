name: Feature request
description: Propose a scoped project capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance behavior
      description: Describe observable examples suitable for tests.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and risks
      description: Include concurrency, compatibility, XML, audit, or safety effects.

